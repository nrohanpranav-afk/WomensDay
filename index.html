<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Family ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Segoe UI",sans-serif;
}

/* BACKGROUND */

body{
background:linear-gradient(-45deg,#fff1f5,#f3f4ff,#fff5f7,#eef2ff);
background-size:400% 400%;
animation:bgMove 20s ease infinite;
min-height:100vh;
color:#333;
overflow-x:hidden;
}

@keyframes bgMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* NAVBAR */

nav{

position:fixed;
top:10px;
left:0;
right:0;

display:flex;
justify-content:center;

z-index:100;

}

.nav-inner{

display:flex;
gap:10px;

background:rgba(255,255,255,.75);
backdrop-filter:blur(18px);

padding:8px 12px;

border-radius:40px;

box-shadow:0 10px 30px rgba(0,0,0,.12);

overflow-x:auto;
scrollbar-width:none;

}

.nav-inner::-webkit-scrollbar{
display:none;
}

nav button{

background:none;
border:none;

padding:8px 14px;

font-size:15px;
font-weight:600;

border-radius:20px;

cursor:pointer;

transition:.25s;

white-space:nowrap;

}

nav button:hover{
background:#ffd6e6;
color:#ff4d88;
}

/* PAGES */

.page{

display:none;
padding-top:120px;
min-height:100vh;

animation:pageFade .6s ease;

}

.page.active{
display:block;
}

@keyframes pageFade{

from{
opacity:0;
transform:translateY(30px);
}

to{
opacity:1;
transform:translateY(0);
}

}

/* HERO */

.hero{
text-align:center;
max-width:700px;
margin:auto;
padding:0 20px;
}

.hero h1{
font-size:44px;
margin-bottom:18px;
}

.hero p{
font-size:19px;
line-height:1.9;
}

/* CARD */

.card{

max-width:760px;
margin:40px auto;

padding:40px;

border-radius:26px;

background:rgba(255,255,255,.55);
backdrop-filter:blur(16px);

box-shadow:0 20px 60px rgba(0,0,0,.12);

line-height:1.9;
font-size:18px;

transition:.35s;

}

.card:hover{

transform:translateY(-6px);

box-shadow:
0 40px 80px rgba(0,0,0,.18),
0 0 25px rgba(255,130,170,.35);

}

/* GALLERY */

.gallery{

max-width:900px;
margin:40px auto;

display:grid;
grid-template-columns:1fr 1fr;

gap:25px;

padding:0 20px;

}

.gallery img{

width:100%;
height:320px;

object-fit:cover;

border-radius:20px;

cursor:pointer;

transition:.35s;

box-shadow:0 20px 40px rgba(0,0,0,.18);

}

.gallery img:hover{
transform:scale(1.05);
}

/* IMAGE VIEWER */

.viewer{

position:fixed;
top:0;
left:0;

width:100%;
height:100%;

background:rgba(0,0,0,.9);

display:none;

justify-content:center;
align-items:center;

z-index:200;

}

.viewer.show{
display:flex;
}

.viewer img{

max-width:90%;
max-height:90%;

border-radius:16px;

animation:zoom .4s ease;

}

@keyframes zoom{

from{
transform:scale(.7);
opacity:0;
}

to{
transform:scale(1);
opacity:1;
}

}

/* COLLAGE */

.collage{

display:grid;
grid-template-columns:repeat(3,1fr);

gap:14px;

max-width:700px;
margin:60px auto;

padding:0 20px;

}

.collage img{

width:100%;
height:200px;

object-fit:cover;

border-radius:14px;

opacity:0;
transform:translateY(30px);

transition:.9s;

}

.collage img.show{
opacity:1;
transform:translateY(0);
}

/* FLOWERS */

.flower{

position:fixed;
top:-10px;

font-size:20px;

animation:fall linear infinite;

pointer-events:none;

opacity:.85;

}

@keyframes fall{

0%{
transform:translateY(-10vh) rotate(0deg);
}

100%{
transform:translateY(110vh) rotate(360deg);
}

}

/* FINAL PAGE */

.loveGlow{
animation:loveGlow 3s infinite alternate;
}

@keyframes loveGlow{

from{
text-shadow:0 0 10px rgba(255,100,150,.4);
}

to{
text-shadow:0 0 30px rgba(255,100,150,.8);
}

}

h1{
text-align:center;
margin-bottom:10px;
}

/* MOBILE */

@media (max-width:768px){

.hero h1{
font-size:32px;
}

.hero p{
font-size:17px;
}

.card{
padding:26px;
margin:30px 16px;
font-size:16px;
}

.gallery{
grid-template-columns:1fr;
}

.gallery img{
height:240px;
}

.collage{
grid-template-columns:1fr 1fr;
}

.collage img{
height:140px;
}

}

</style>

</head>

<body>

<nav>
<div class="nav-inner">

<button onclick="showPage('home')">Home</button>
<button onclick="showPage('mom')">Mummiee</button>
<button onclick="showPage('ammamma')">Ammamma</button>
<button onclick="showPage('nanamma')">Nanamma</button>
<button onclick="showPage('love')">❤️</button>

</div>
</nav>

<div class="page active" id="home">

<div class="hero">

<h1>For My Beautiful Family ❤️</h1>
<p id="homeText"></p>

</div>

</div>

<div class="page" id="mom">

<h1>For My Mummiee ❤️</h1>

<div class="card">
<p id="momText"></p>
</div>

<div class="gallery">

<img src="mom1.jpg" onclick="openViewer(this)">
<img src="mom2.jpg" onclick="openViewer(this)">

</div>

</div>

<div class="page" id="ammamma">

<h1>For My Ammamma ❤️</h1>

<div class="card">
<p id="ammammaText"></p>
</div>

<div class="gallery">

<img src="ammamma1.jpg" onclick="openViewer(this)">
<img src="ammamma2.jpg" onclick="openViewer(this)">

</div>

</div>

<div class="page" id="nanamma">

<h1>For My Nanamma ❤️</h1>

<div class="card">
<p id="nanammaText"></p>
</div>

<div class="gallery">

<img src="nanamma1.jpg" onclick="openViewer(this)">
<img src="nanamma2.jpg" onclick="openViewer(this)">

</div>

</div>

<div class="page" id="love">

<h1 class="loveGlow">I Love You All ❤️</h1>

<div class="collage">

<img src="mom1.jpg">
<img src="ammamma1.jpg">
<img src="nanamma1.jpg">

<img src="mom2.jpg">
<img src="ammamma2.jpg">
<img src="nanamma2.jpg">

</div>

</div>

<div class="viewer" id="viewer" onclick="closeViewer()">
<img id="viewerImg">
</div>

<script>

/* PAGE SWITCH */

function showPage(id){

document.querySelectorAll(".page").forEach(p=>{
p.classList.remove("active")
})

document.getElementById(id).classList.add("active")

}

/* IMAGE VIEWER */

function openViewer(img){

viewerImg.src=img.src
viewer.classList.add("show")

}

function closeViewer(){
viewer.classList.remove("show")
}

/* TYPEWRITER */

function typeWriter(el,text,speed=25){

let i=0

function typing(){

if(i<text.length){
el.innerHTML+=text.charAt(i)
i++
setTimeout(typing,speed)
}

}

typing()

}

/* TEXT */

const homeMsg=`This small website is something I created with love for the most important people in my life.

Family is where our happiest memories are created. Every laugh we share, every conversation, and every small moment together becomes something beautiful that stays in our hearts forever.

Mummiee, Ammamma, and Nanamma — you are the people who make my life brighter every single day.

Your love and your kindness mean more to me than words can explain.

Thank you for everything.

I love you all very much.`

const momMsg=`Mummiee,

You are the strongest and most caring person in my life.

From the very beginning you have always been there for me.

Your love and patience inspire me every single day.

I am very lucky to have you as my mom.

I will always love you and appreciate everything you do for me.`

const ammammaMsg=`అమ్మమ్మా,

మీరు మా కుటుంబంలో ఎంతో ప్రేమతో, ఆనందంతో నింపే వ్యక్తి.

మీ నవ్వు చూసినప్పుడల్లా మా అందరికీ ఎంతో సంతోషం కలుగుతుంది.

మేము మిమ్మల్ని చాలా ప్రేమిస్తున్నాము.`

const nanammaMsg=`నానమ్మా,

మీ ప్రేమ మరియు ఆశీస్సులు ఎప్పటికీ మా జీవితాల్లో వెలుగులా ఉంటాయి.

మీరు మా కుటుంబానికి ఎంతో విలువైన వ్యక్తి.

మేము మిమ్మల్ని ఎంతో ప్రేమిస్తున్నాము.`

typeWriter(homeText,homeMsg)
typeWriter(momText,momMsg)
typeWriter(ammammaText,ammammaMsg)
typeWriter(nanammaText,nanammaMsg)

/* FLOWERS */

function createFlower(){

const flower=document.createElement("div")

flower.className="flower"
flower.innerHTML="🌸"

flower.style.left=Math.random()*100+"vw"
flower.style.animationDuration=8+Math.random()*5+"s"

document.body.appendChild(flower)

setTimeout(()=>flower.remove(),12000)

}

setInterval(createFlower,900)

/* SCROLL REVEAL */

const observer=new IntersectionObserver(entries=>{

entries.forEach(entry=>{

if(entry.isIntersecting){
entry.target.classList.add("show")
}

})

})

document.querySelectorAll(".collage img").forEach(el=>{
observer.observe(el)
})

</script>

</body>
</html>
